apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-deployment
  namespace: mahesh-ns
  labels:
    app: fitness

spec:
  replicas: 8
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%

  selector:
    matchLabels:
      app: fitness

  template:
    metadata:
      labels:
        app: fitness
    spec:
      containers:
        - name: fitness-container
          image: muralisocial123/fitness-app:v1.0.1
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: fitness-deployment-svc
  namespace: mahesh-ns
spec:
  selector:
    app: fitness
  ports:
    - port: 3001 # this is a Service port number we use to expose application to the internet
      targetPort: 5000 # this is a Container port number we have defined in the Deployment file
      protocol: TCP
  type: NodePort